<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ASCIIMUD — Twitch Overlay</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="viewer.css" />
</head>
<body data-combat="0" data-target="0" class="tx-collapsed">

  <div id="widget">
    <div id="asciiNoise" aria-hidden="true"></div>

    <div id="widgetHeader">
      <span id="widgetTitle">ASCIIMUD</span>
      <span id="widgetChevron">▼</span>
    </div>

    <div id="widgetBody">

      <!-- ── Compact section: always visible ── -->
      <div id="compactSection">
        <div class="w-row">
          <span class="w-label">ZONE</span>
          <span id="zone" class="w-val">—</span>
          <span id="coords" class="w-coords"></span>
        </div>

        <div class="w-row">
          <span class="w-label">SEV</span>
          <span id="severity" data-level="0" class="w-sev">0</span>
        </div>

        <div class="w-row">
          <span class="w-label">HEALTH</span>
          <span class="w-pct"><span id="hpVal">—/—</span> <span id="hpPct" class="dim">—%</span></span>
        </div>
        <div class="bar bar-hp"><div class="fill" id="hpFill"></div></div>

        <div class="w-row">
          <span class="w-label" id="powerLabel">MANA</span>
          <span class="w-pct"><span id="mpVal">—/—</span> <span id="mpPct" class="dim">—%</span></span>
        </div>
        <div class="bar bar-mp"><div class="fill" id="mpFill"></div></div>

        <div class="w-row">
          <span class="w-label">TARGET</span>
          <span id="targetName" class="w-val">NO TARGET</span>
        </div>
      </div>

      <!-- ── Expanded section: hidden in compact mode ── -->
      <div id="expandedSection">

        <!-- Player portrait row -->
        <div class="w-portrait-row">
          <div class="portrait-icon" id="portraitIcon"></div>
          <div class="portrait-meta">
            <div class="big-name" id="playerName">PLAYER</div>
            <div class="sub" id="playerSub">— —</div>
          </div>
          <div class="lvl-badge" id="playerLevel">1</div>
        </div>

        <!-- XP bar -->
        <div class="w-row tiny">
          <span class="w-label dim">XP</span>
          <span id="xpPct" class="w-pct dim">—</span>
        </div>
        <div class="bar bar-xp"><div class="fill" id="xpFill"></div></div>

        <!-- Combo points + state tags -->
        <div class="player-foot">
          <span class="combo" id="comboPoints">●●●●●</span>
          <span class="meta-tag" id="restingTag" hidden>ZZZ</span>
          <span class="meta-tag" id="mountedTag" hidden>MOUNT</span>
          <span class="meta-tag" id="pvpTag" hidden>PVP</span>
          <span class="meta-tag" id="groupTag" hidden>GROUP</span>
        </div>

        <!-- Player cast bar -->
        <div id="playerCast" class="cast-bar">
          <div class="cast-label" id="playerCastSpell">—</div>
          <div class="bar bar-cast"><div class="fill" id="playerCastFill"></div></div>
        </div>

        <!-- Buff aura strip -->
        <div class="aura-strip" id="buffStrip" aria-label="buffs"></div>

        <div class="w-divider"></div>

        <!-- Target details -->
        <div class="w-row">
          <span class="w-label" id="targetLabel">—</span>
          <span class="w-pct">
            <span id="targetVal">—/—</span>
            <span id="targetPct" class="dim">—%</span>
          </span>
          <span class="w-lvl">
            <span id="targetLevel" data-cls="normal" class="lvl-badge-sm">—</span>
          </span>
        </div>
        <div class="bar bar-target"><div class="fill" id="targetFill"></div></div>
        <div class="w-sub" id="targetSub">—</div>

        <!-- Target cast bar -->
        <div id="targetCast" class="cast-bar">
          <div class="cast-label" id="targetCastSpell">—</div>
          <div class="bar bar-cast"><div class="fill" id="targetCastFill"></div></div>
        </div>

        <!-- Debuff aura strip -->
        <div class="aura-strip" id="debuffStrip" aria-label="debuffs"></div>

        <!-- Gold / bag / durability stats -->
        <div class="player-stats">
          <span><span class="dim">GOLD</span> <span id="goldVal">0</span></span>
          <span><span class="dim">BAG</span>  <span id="bagVal">—</span></span>
          <span><span class="dim">DUR</span>  <span id="durVal">—</span></span>
        </div>

        <!-- Minimap + feed (app.js writes here; hidden visually but IDs exist) -->
        <div id="minimapPanel" class="w-hidden">
          <div id="minimapHeader">
            <span id="minimapZoneName">—</span>
            <span id="minimapCoords"></span>
          </div>
          <pre id="minimap" aria-label="zone minimap"></pre>
        </div>
        <section id="feed" class="w-hidden" aria-label="event feed"></section>

      </div><!-- /expandedSection -->

      <footer id="status">disconnected</footer>

    </div><!-- /widgetBody -->
  </div><!-- /widget -->

  <script>window.ASCIIMUD_DEFER_CONNECT = true;</script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
