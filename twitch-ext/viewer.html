<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ASCIIMUD — Twitch Overlay</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="viewer.css" />
</head>
<body data-combat="0" data-target="0" class="tx-collapsed">

  <div id="widget">
    <div id="asciiNoise" aria-hidden="true"></div>

    <div id="widgetHeader">
      <span id="widgetTitle">ASCIIMUD</span>
      <span id="widgetChevron">▼</span>
    </div>

    <div id="widgetBody">

      <!-- ── Compact section: always visible ── -->
      <div id="compactSection">

        <div class="w-row">
          <span class="w-label">ZONE:</span>
          <div class="w-content">
            <span id="zone" class="w-val c-zone">—</span>
            <span id="coords" class="w-val" style="color:#555;font-size:11px;margin-left:4px"></span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label">HEALTH:</span>
          <div class="w-content">
            <span id="hpBar" class="ascii-bar c-hp">██████████</span>
            <span id="hpPct" class="bar-pct c-hp">100%</span>
            <span id="hpVal" style="display:none">—</span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label" id="powerLabel">MANA:</span>
          <div class="w-content">
            <span id="mpBar" class="ascii-bar c-mp">██████████</span>
            <span id="mpPct" class="bar-pct c-mp">100%</span>
            <span id="mpVal" style="display:none">—</span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label">TARGET:</span>
          <div class="w-content">
            <span id="targetName" class="w-val c-target">NO TARGET</span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label">SEV:</span>
          <div class="w-content">
            <span id="severity" data-level="0">█████</span>
          </div>
        </div>

      </div><!-- /compactSection -->

      <!-- ── Expanded section ── -->
      <div id="expandedSection">
        <div class="w-divider"></div>

        <div class="w-row">
          <span class="w-label">PLAYER:</span>
          <div class="w-content">
            <span id="playerName" class="w-val" style="color:#e8e8e8">—</span>
            <span id="playerSub"  style="color:#666;font-size:11px">—</span>
            <span id="playerLevel" style="color:#facc15;font-size:12px;margin-left:4px">—</span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label">XP:</span>
          <div class="w-content">
            <span id="xpBar" class="ascii-bar c-xp">██████████</span>
            <span id="xpPct" class="bar-pct c-xp">—</span>
          </div>
        </div>

        <div class="w-row">
          <span class="w-label">TARGET HP:</span>
          <div class="w-content">
            <span id="targetBar" class="ascii-bar c-target">██████████</span>
            <span id="targetPct" class="bar-pct c-target">—%</span>
            <span id="targetVal" style="display:none">—</span>
          </div>
        </div>
        <div class="w-sub" id="targetSub" style="margin-left:96px;margin-bottom:6px">—</div>

        <div class="w-row" id="playerCast">
          <span class="w-label">CASTING:</span>
          <div class="w-content">
            <span id="playerCastBar" class="ascii-bar c-cast">──────────</span>
            <span id="playerCastSpell" style="color:#aaa;font-size:11px">—</span>
          </div>
        </div>

        <div class="player-stats">
          <span><span style="color:#666">GOLD</span> <span id="goldVal">0</span></span>
          <span><span style="color:#666">BAG</span>  <span id="bagVal">—</span></span>
          <span><span style="color:#666">DUR</span>  <span id="durVal">—</span></span>
        </div>

        <!-- Hidden elements that app.js writes to — IDs must exist -->
        <span id="portraitIcon"    style="display:none"></span>
        <div  id="xpFill"         style="display:none"></div>
        <div  id="hpFill"         style="display:none"></div>
        <div  id="mpFill"         style="display:none"></div>
        <div  id="targetFill"     style="display:none"></div>
        <span id="targetLabel"    style="display:none"></span>
        <span id="targetLevel"    style="display:none"></span>
        <span id="comboPoints"    style="display:none"></span>
        <span id="restingTag"     style="display:none"></span>
        <span id="mountedTag"     style="display:none"></span>
        <span id="pvpTag"         style="display:none"></span>
        <span id="groupTag"       style="display:none"></span>
        <div  id="buffStrip"      style="display:none"></div>
        <div  id="debuffStrip"    style="display:none"></div>
        <div  id="targetCast"     style="display:none">
          <span id="targetCastSpell"></span>
          <div  id="targetCastFill"></div>
        </div>
        <div  id="playerCastFill" style="display:none"></div>
        <div  id="minimapPanel"   style="display:none">
          <div id="minimapHeader">
            <span id="minimapZoneName"></span>
            <span id="minimapCoords"></span>
          </div>
          <pre id="minimap"></pre>
        </div>
        <section id="feed" style="display:none" aria-label="event feed"></section>

      </div><!-- /expandedSection -->

      <footer id="status">disconnected</footer>

    </div><!-- /widgetBody -->
  </div><!-- /widget -->

  <script>window.ASCIIMUD_DEFER_CONNECT = true;</script>
  <script src="icons.js"></script>
  <script src="app.js"></script>
  <script src="viewer.js"></script>
</body>
</html>
