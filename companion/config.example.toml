[wow]
# Directory containing WoW logs. The companion auto-tails the newest
# WoWChatLog*.txt and WoWCombatLog*.txt within this dir.
log_dir = "C:/Program Files (x86)/World of Warcraft/_classic_era_/Logs"
chat_log_pattern   = "WoWChatLog*.txt"
combat_log_pattern = "WoWCombatLog*.txt"

# Screenshot directory and pattern. The screen-grid encoder writes JPGs
# here; the companion decodes them in real time.
screenshots_dir     = "C:/Program Files (x86)/World of Warcraft/_classic_era_/Screenshots"
screenshots_pattern = "WoWScrnShot_*.jpg"

[server]
host = "127.0.0.1"
port = 8765

[twitch]
# Optional. If `ebs_url` is set, the companion HMAC-signs and forwards every
# event to the Cloudflare Workers EBS so the Twitch extension can fan it out
# to viewers. Snapshots are coalesced to ~5 Hz (min_interval) before sending.
# Leave ebs_url = "" (or omit the whole section) to disable forwarding —
# local OBS overlay still works on ws://127.0.0.1:8765.
ebs_url      = ""           # e.g. "https://asciimud-ebs.<your-subdomain>.workers.dev"
channel_id   = ""           # an opaque per-broadcaster id; must match the
                            # KV key set with `wrangler kv:key put SECRETS secret:<channel_id>`
secret       = ""           # hex-encoded shared HMAC secret
min_interval = 0.2          # seconds between EBS POSTs (snapshot coalesce)

# Legacy alias supported for back-compat: [ebs] url/shared_secret.

