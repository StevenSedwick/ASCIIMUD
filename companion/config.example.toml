[wow]
# Absolute path to the WoW chat log written by /chatlog.
# Classic Era default:
#   C:\Program Files (x86)\World of Warcraft\_classic_era_\Logs\WoWChatLog.txt
log_path = "C:/Program Files (x86)/World of Warcraft/_classic_era_/Logs/WoWChatLog.txt"
# Combat log written by /combatlog (the addon enables this automatically).
# Defaults to log_path's directory + WoWCombatLog.txt if omitted.
combat_log_path = "C:/Program Files (x86)/World of Warcraft/_classic_era_/Logs/WoWCombatLog.txt"

[server]
host = "127.0.0.1"
port = 8765

[ebs]
# Optional. If set, the companion forwards every event to the cloud EBS too,
# so the Twitch Extension can fan out to viewers. Leave url = "" to disable.
url           = ""
channel_id    = ""        # your Twitch numeric channel/user id
shared_secret = ""        # must match ebs/config.toml -> ingest.shared_secret
