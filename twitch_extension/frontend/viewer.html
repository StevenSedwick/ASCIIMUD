<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>ASCIIMUD Viewer</title>
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self' https://*.jtvnw.net https://*.twitch.tv https://*.twitchcdn.net wss:; img-src 'self' data: https://*; style-src 'self' 'unsafe-inline'; script-src 'self' https://extension-files.twitch.tv;" />
  <link rel="stylesheet" href="viewer.css" />
  <script src="https://extension-files.twitch.tv/helper/v1/twitch-ext.min.js"></script>
</head>
<body>
  <div id="card">
    <header id="hdr">
      <span id="zone">—</span>
      <span id="sev" data-level="0">SEV 0</span>
    </header>

    <div class="vital">
      <div class="row"><span class="label">PLAYER</span><span id="hpPct">— %</span></div>
      <div class="bar"><div class="fill" id="hpFill"></div></div>
      <div class="row"><span class="label dim">MANA</span><span id="mpPct" class="dim">— %</span></div>
      <div class="bar mp"><div class="fill" id="mpFill"></div></div>
    </div>

    <div class="vital target" id="targetCard">
      <div class="row"><span class="label" id="targetLabel">NO TARGET</span><span id="tgtPct">— %</span></div>
      <div class="bar t"><div class="fill" id="tgtFill"></div></div>
    </div>

    <footer id="status">connecting…</footer>
  </div>
  <script src="viewer.js"></script>
</body>
</html>
