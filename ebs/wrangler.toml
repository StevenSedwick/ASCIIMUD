name = "asciimud-ebs"
main = "src/index.ts"
compatibility_date = "2026-04-30"

[[durable_objects.bindings]]
name = "CHANNEL_ROOM"
class_name = "ChannelRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChannelRoom"]

[[kv_namespaces]]
binding = "SECRETS"
id = "6d8b18982e0a4ad4b1cc696d4fc0b52e"

[vars]
# Comma-separated list of base64-encoded Twitch extension secrets (from the
# Twitch Developer Console -> Extension Settings -> Client Configuration).
# Multiple values support secret rotation. Override via:
#   npx wrangler secret put TWITCH_EXT_SECRETS
TWITCH_EXT_SECRETS = ""
